version: '3.8'

services:
  # FTP Server (for local development)
  # All authentication and uploads are proxied to the SabaiPics API
  ftp-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sabaipics-ftp-server
    environment:
      # FTP Server settings
      FTP_LISTEN_ADDRESS: 0.0.0.0:21
      FTP_PASSIVE_PORT_START: 5000
      FTP_PASSIVE_PORT_END: 5099
      FTP_IDLE_TIMEOUT: 300

      # API URL (required) - FTP server proxies all uploads to this API
      API_URL: ${API_URL:-https://api.sabaipics.com}
      NODE_ENV: ${NODE_ENV:-development}

      # Optional OTLP export to Grafana Cloud
      GRAFANA_OTLP_TRACES_URL: ${GRAFANA_OTLP_TRACES_URL:-}
      OTLP_TRACES_USER: ${OTLP_TRACES_USER:-}
      OTLP_TRACES_TOKEN: ${OTLP_TRACES_TOKEN:-}
      OTEL_TRACE_SAMPLE_RATIO: ${OTEL_TRACE_SAMPLE_RATIO:-1.0}
      GRAFANA_OTLP_METRICS_URL: ${GRAFANA_OTLP_METRICS_URL:-https://otlp-gateway-prod-ap-southeast-1.grafana.net/otlp}
      OTLP_METRICS_USER: ${OTLP_METRICS_USER:-}
      OTLP_METRICS_TOKEN: ${OTLP_METRICS_TOKEN:-}
      GRAFANA_LOKI_URL: ${GRAFANA_LOKI_URL:-}
      LOKI_USER: ${LOKI_USER:-}
      LOKI_TOKEN: ${LOKI_TOKEN:-}

    ports:
      - "2121:21"           # FTP command port
      - "5000-5099:5000-5099"  # FTP passive ports
    networks:
      - ftp-network

networks:
  ftp-network:
    driver: bridge
